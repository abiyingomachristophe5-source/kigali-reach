<script>
const wl = getWishlist();
const grid = document.getElementById("wlGrid");
const sub  = document.getElementById("wlSubtitle");
if (!wl.length) {
  sub.textContent = "Your wishlist is empty.";
  grid.innerHTML = `<div class="cart-empty" style="grid-column:1/-1"><div class="cart-empty-icon">♡</div><h2>Nothing saved yet</h2><p>Heart items on any product to save them here.</p><a href="products.html" class="hero-cta" style="display:inline-flex;margin:0 auto">Browse Products →</a></div>`;
} else {
  sub.textContent = wl.length + " saved item" + (wl.length !== 1 ? "s" : "");
  grid.innerHTML = wl.map(item => buildCard({ ...item, inStock: true, isNew: false, isFeatured: false, salePrice: null, description: "" })).join("");
}
